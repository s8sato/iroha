name: I2::Dev::Nightly::Publish

on: workflow_dispatch

env:
  DOCKER_COMPOSE_PATH: defaults

jobs:
  build_executor:
    runs-on: ubuntu-latest
    container:
      image: hyperledger/iroha2-ci:nightly-2024-09-09
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build iroha executor
        run: mold --run cargo run --bin iroha_wasm_builder -- build ./wasm_samples/default_executor --optimize --out-file ${{ env.DOCKER_COMPOSE_PATH }}/executor.wasm
      - name: Upload executor to reuse in other jobs
        uses: actions/upload-artifact@v4
        with:
          name: executor.wasm
          path: ${{ env.DOCKER_COMPOSE_PATH }}/executor.wasm
          retention-days: 1

  build_genesis_trigger_blobs:
    runs-on: ubuntu-latest
    container:
      image: hyperledger/iroha2-ci:nightly-2024-09-09
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.CHECKOUT_REF }}
      - uses: Swatinem/rust-cache@v2
      - name: Build genesis trigger blobs
        run: |
          mkdir -p ${{ env.DOCKER_COMPOSE_PATH }}/blobs
          cargo run --release --bin kagami -- genesis generate --executor-path-in-genesis ./executor.wasm --genesis-public-key ed01204164BF554923ECE1FD412D241036D863A6AE430476C898248B8237D77534CFC4 > ${{ env.DOCKER_COMPOSE_PATH }}/genesis.json
      - name: Upload genesis trigger blobs to reuse in other jobs
        uses: actions/upload-artifact@v4
        with:
          name: blobs
          path: ${{ env.DOCKER_COMPOSE_PATH }}/blobs
          retention-days: 1

  dockerhub:
    runs-on: ubuntu-latest
    needs: [build_executor, build_genesis_trigger_blobs]
    container:
      image: hyperledger/iroha2-ci:nightly-2024-09-09
    steps:
      - uses: actions/checkout@v4
      - name: Download executor.wasm file
        uses: actions/download-artifact@v4
        with:
          name: executor.wasm
          path: ${{ env.DOCKER_COMPOSE_PATH }}
      - name: Download genesis trigger blobs
        uses: actions/download-artifact@v4
        with:
          name: blobs
          path: ${{ env.DOCKER_COMPOSE_PATH }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push iroha2:dev-nightly image
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: hyperledger/iroha:dev-nightly-${{ github.sha }}
          labels: commit=${{ github.sha }}
          build-args: TAG=dev
          # This context specification is required
          context: .
